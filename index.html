<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #1e1e2f;
  color: white;
  text-align: center;
}

/* screens */
.screen { display: none; padding: 20px; }
.active { display: block; }

/* PIN buttons */
.pin-btn {
  width: 70px;
  height: 70px;
  font-size: 22px;
  margin: 8px;
  border-radius: 15px;
  border: none;
  background: #ff6b81;
  color: white;
}

/* menu */
.menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-top: 30px;
}

.card {
  background: #2c2c54;
  padding: 25px;
  border-radius: 18px;
  font-size: 18px;
}

/* album grid */
.album {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.album img {
  width: 100%;
  border-radius: 12px;
}

/* media */
video {
  width: 100%;
  max-width: 350px;
  border-radius: 12px;
}

/* button */
button {
  padding: 12px 18px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: #ff6b81;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- PIN -->
<div id="pin" class="screen active">
  <h2>🔐 Enter PIN</h2>
  <p>*Clue: the day you said yes*</p>
  <h2 id="display">______</h2>

  <div>
    <button class="pin-btn" onclick="press(1)">1</button>
    <button class="pin-btn" onclick="press(2)">2</button>
    <button class="pin-btn" onclick="press(3)">3</button><br>

    <button class="pin-btn" onclick="press(4)">4</button>
    <button class="pin-btn" onclick="press(5)">5</button>
    <button class="pin-btn" onclick="press(6)">6</button><br>

    <button class="pin-btn" onclick="press(7)">7</button>
    <button class="pin-btn" onclick="press(8)">8</button>
    <button class="pin-btn" onclick="press(9)">9</button><br>

    <button class="pin-btn" onclick="del()">←</button>
    <button class="pin-btn" onclick="press(0)">0</button>
    <button class="pin-btn" onclick="clearPin()">C</button>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <h2>I Hope you enjoy your stay my love ❤️</h2>

  <div class="menu">
    <div class="card" onclick="show('album')">📸 Album</div>
    <div class="card" onclick="show('music')">🎵 Music</div>
    <div class="card" onclick="show('video')">🎥 Video</div>
    <div class="card" onclick="show('message')">💌 Message</div>
  </div>
</div>

<!-- ALBUM -->
<div id="album" class="screen">
  <h2>📸 Album</h2>

  <div class="album">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
    <img src="photo5.jpg">
    <img src="photo6.jpg">
    <img src="photo7.jpg">
    <img src="photo8.jpg">
    <img src="photo9.jpg">
    <img src="photo10.jpg">
    <img src="photo11.jpg">
    <img src="photo12.jpg">
    <img src="photo13.jpg">
    <img src="photo14.jpg">
    <img src="photo15.jpg">
    <img src="photo16.jpg">
    <img src="photo17.jpg">
    <img src="photo18.jpg">
    <img src="photo19.jpg">
    <img src="photo20.jpg">
  </div>

  <button onclick="goBack()">Back</button>
</div>

<!-- MUSIC (VIDEO TYPE) -->
<div id="music" class="screen">
  <h2>🎵 Music</h2>

  <video id="musicPlayer" loop>
    <source src="music.mp4">
  </video>

  <button onclick="goBack()">Back</button>
</div>

<!-- VIDEO -->
<div id="video" class="screen">
  <h2>🎥 Video</h2>

  <video id="vid" controls>
    <source src="video.mp4">
  </video>

  <button onclick="goBack()">Back</button>
</div>

<!-- MESSAGE -->
<div id="message" class="screen">
  <h2>💌 Message</h2>
  <p>
    I'm really sorry mahal 😔<br>
    Babawi ako sayo 🥺<br>
    I love you so much ❤️
  </p>

  <button onclick="goBack()">Back</button>
</div>

<script>
const PIN = "021423";
let input = "";

function press(n){
  if(input.length < 6){
    input += n;
    update();
  }

  if(input.length === 6){
    if(input === PIN){
      show('menu');
    } else {
      alert("Wrong PIN!");
      clearPin();
    }
  }
}

function del(){
  input = input.slice(0,-1);
  update();
}

function clearPin(){
  input = "";
  update();
}

function update(){
  document.getElementById("display").innerText =
    input.padEnd(6, "_");
}

function show(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id === 'music'){
    document.getElementById('musicPlayer').play();
  }
}

function goBack(){
  const music = document.getElementById('musicPlayer');
  music.pause();
  music.currentTime = 0;

  const vid = document.getElementById('vid');
  vid.pause();
  vid.currentTime = 0;

  show('menu');
}
</script>

</body>
</html>
