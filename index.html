<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #1e1e2f;
  color: white;
  text-align: center;
}

/* screens */
.screen {
  display: none;
  padding: 20px;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.active {
  display: block;
  opacity: 1;
}

/* PIN buttons */
.pin-btn {
  width: 70px;
  height: 70px;
  font-size: 22px;
  margin: 8px;
  border-radius: 15px;
  border: none;
  background: #ff6b81;
  color: white;
}

/* menu */
.menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-top: 30px;
}
.card {
  background: #2c2c54;
  padding: 25px;
  border-radius: 18px;
  font-size: 18px;
}

/* album */
.album {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.album img {
  width: 100%;
  border-radius: 12px;
  cursor: pointer;
}

/* fullscreen viewer */
#viewer {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}
#viewer img {
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
}

/* media */
video {
  width: 100%;
  max-width: 350px;
  border-radius: 12px;
}

/* notes */
.note {
  background: #ffffff;
  color: #333;
  padding: 18px;
  border-radius: 15px;
  margin: 15px 0;
  text-align: left;
  line-height: 1.6;
  min-height: 120px;
}

/* button */
button {
  padding: 12px 18px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: #ff6b81;
  color: white;
}
</style>
</head>

<body>

<!-- PIN -->
<div id="pin" class="screen active">
  <h2>🔐 Enter PIN</h2>
  <p>*Clue: the day you said yes*</p>
  <h2 id="display">______</h2>

  <div>
    <button class="pin-btn" onclick="press(1)">1</button>
    <button class="pin-btn" onclick="press(2)">2</button>
    <button class="pin-btn" onclick="press(3)">3</button><br>

    <button class="pin-btn" onclick="press(4)">4</button>
    <button class="pin-btn" onclick="press(5)">5</button>
    <button class="pin-btn" onclick="press(6)">6</button><br>

    <button class="pin-btn" onclick="press(7)">7</button>
    <button class="pin-btn" onclick="press(8)">8</button>
    <button class="pin-btn" onclick="press(9)">9</button><br>

    <button class="pin-btn" onclick="del()">←</button>
    <button class="pin-btn" onclick="press(0)">0</button>
    <button class="pin-btn" onclick="clearPin()">C</button>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <h2>I Hope you enjoy your stay my love ❤️</h2>

  <div class="menu">
    <div class="card" onclick="show('album')">📸 Album</div>
    <div class="card" onclick="show('music')">🎵 Music</div>
    <div class="card" onclick="show('video')">🎥 Video</div>
    <div class="card" onclick="show('message')">💌 Message</div>
  </div>
</div>

<!-- ALBUM -->
<div id="album" class="screen">
  <h2>📸 Album</h2>

  <div class="album">
    <script>
      for(let i=1;i<=20;i++){
        document.write(`<img src="photo${i}.jpg" onclick="openImg(this.src)">`);
      }
    </script>
  </div>

  <button onclick="goBack()">Back</button>
</div>

<!-- FULLSCREEN VIEW -->
<div id="viewer" onclick="closeImg()">
  <img id="fullImg">
</div>

<!-- MUSIC -->
<div id="music" class="screen">
  <h2>🎵 Music</h2>
  <video id="musicPlayer" loop>
    <source src="175f13c3a002766ca3242f36b5e5f0c8.mp4">
  </video>
  <button onclick="goBack()">Back</button>
</div>

<!-- VIDEO -->
<div id="video" class="screen">
  <h2>🎥 Video</h2>
  <video id="vid" controls>
    <source src="video.mp4">
  </video>
  <button onclick="goBack()">Back</button>
</div>

<!-- MESSAGE -->
<div id="message" class="screen">
  <h2>💌 Message</h2>

  <div class="note">
    <b>-About You-</b><br><br>
    <span id="aboutText"></span>
  </div>

  <div class="note">
    <b>-My message for you-</b><br><br>
    <span id="msgText"></span>
  </div>

  <button onclick="goBack()">Back</button>
</div>

<script>
const PIN="021423";
let input="";

/* PIN */
function press(n){
  if(input.length<6){
    input+=n;
    update();
  }
  if(input.length===6){
    if(input===PIN){ show('menu'); }
    else{ alert("Wrong PIN!"); clearPin(); }
  }
}
function del(){ input=input.slice(0,-1); update(); }
function clearPin(){ input=""; update(); }
function update(){ display.innerText=input.padEnd(6,"_"); }

/* NAV */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==='music'){
    document.getElementById('musicPlayer').play();
  }

  if(id==='message'){
    typeWriter(aboutText, "aboutText", 15, () => {
      typeWriter(msgText, "msgText", 15);
    });
  }
}

/* BACK */
function goBack(){
  musicPlayer.pause(); musicPlayer.currentTime=0;
  vid.pause(); vid.currentTime=0;
  show('menu');
}

/* IMAGE VIEWER */
function openImg(src){
  viewer.style.display='flex';
  fullImg.src=src;
}
function closeImg(){
  viewer.style.display='none';
}

/* TYPEWRITER */
const aboutText = `Your go to-milk tea flavors:
Dark nutella chsck
Blueberry chsck
Red Velvet
Strawberry choco
Dark choco
Strawberry oreo choco

You love Jollibee a lot, pineapple juice there and yum burger without patties.

You like ham and cheese pizza and cheese fries.

You like strawberry, chocolate, cookies and cream ice cream.

You don’t like beans in halo-halo.

You only eat repolyo, sitaw, potato and eggplant.

You like putting lotion or water in your feet.`;

const msgText = `Hi baby imissyouuuuu, thank you for everything. Thank you for loving me, making me laugh, and staying with me.

I notice your sweetness lately and I love it so much.

I love you so much mahal, no words can explain it.

Sorry for my mistakes, I’ll do better for you.

Always remember I love you so much ❤️`;

function typeWriter(text, id, speed, cb){
  let i=0;
  const el=document.getElementById(id);
  el.innerHTML="";

  function typing(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,speed);
    } else if(cb){ cb(); }
  }
  typing();
}
</script>

</body>
</html>
