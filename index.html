<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#1e1e2f;
  color:white;
  text-align:center;
}

/* screens */
.screen{display:none;padding:20px;}
.active{display:block;}

/* PIN */
.pin-btn{
  width:70px;height:70px;margin:8px;
  font-size:22px;border:none;border-radius:15px;
  background:#ff6b81;color:white;
}

/* menu */
.menu{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;margin-top:30px;
}
.card{
  background:#2c2c54;
  padding:25px;border-radius:18px;
}

/* FULLSCREEN ALBUM */
#albumViewer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
#albumViewer img{
  width:100%;
  max-height:80vh;
  object-fit:contain;
}
.dots{
  margin-top:10px;
}
.dot{
  height:8px;width:8px;
  background:gray;
  border-radius:50%;
  margin:3px;
  display:inline-block;
}
.dot.active{background:white;}

/* note */
.note{
  background:#fff8dc;
  color:#2b2b2b;
  padding:20px;
  border-radius:12px;
  margin:15px 0;
  font-family:'Handlee',cursive;
  text-align:left;
}

/* envelope */
.envelope{
  background:#ff6b81;
  padding:40px;
  border-radius:15px;
  margin:20px auto;
  width:80%;
  max-width:300px;
}

/* media */
video{
  width:100%;
  max-width:350px;
  border-radius:12px;
}

/* button */
button{
  padding:12px 18px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#ff6b81;
  color:white;
}
</style>
</head>

<body>

<!-- PIN -->
<div id="pin" class="screen active">
<h2>🔐 Enter PIN</h2>
<p>*Clue: the day you said yes*</p>
<h2 id="display">______</h2>

<div>
<button class="pin-btn" onclick="press(1)">1</button>
<button class="pin-btn" onclick="press(2)">2</button>
<button class="pin-btn" onclick="press(3)">3</button><br>

<button class="pin-btn" onclick="press(4)">4</button>
<button class="pin-btn" onclick="press(5)">5</button>
<button class="pin-btn" onclick="press(6)">6</button><br>

<button class="pin-btn" onclick="press(7)">7</button>
<button class="pin-btn" onclick="press(8)">8</button>
<button class="pin-btn" onclick="press(9)">9</button><br>

<button class="pin-btn" onclick="del()">←</button>
<button class="pin-btn" onclick="press(0)">0</button>
<button class="pin-btn" onclick="clearPin()">C</button>
</div>
</div>

<!-- MENU -->
<div id="menu" class="screen">
<h2>I Hope you enjoy your stay my love ❤️</h2>

<div class="menu">
<div class="card" onclick="openAlbum()">📸 Album</div>
<div class="card" onclick="show('music')">🎵 Music</div>
<div class="card" onclick="show('video')">🎥 Video</div>
<div class="card" onclick="show('message')">💌 Message</div>
</div>
</div>

<!-- ALBUM FULLSCREEN -->
<div id="albumViewer">
<img id="albumImg">
<div class="dots" id="dots"></div>
<button onclick="closeAlbum()">Back</button>
</div>

<!-- MUSIC -->
<div id="music" class="screen">
<h2>🎵 Music</h2>
<video id="musicPlayer" loop>
<source src="175f13c3a002766ca3242f36b5e5f0c8.mp4">
</video>
<button onclick="goBack()">Back</button>
</div>

<!-- VIDEO -->
<div id="video" class="screen">
<h2>🎥 Video</h2>
<video id="vid" controls>
<source src="video.mp4">
</video>
<button onclick="goBack()">Back</button>
</div>

<!-- MESSAGE -->
<div id="message" class="screen">
<h2>💌 Message</h2>

<div id="envelope" class="envelope" onclick="openLetter()">
💖 Tap to open letter
</div>

<div class="note">
<b>-About You-</b><br><br>
<span id="aboutText"></span>
</div>

<div class="note">
<b>-My message for you-</b><br><br>
<span id="msgText"></span>
</div>

<button onclick="goBack()">Back</button>
</div>

<script>
const PIN="021423";
let input="";

/* PIN */
function press(n){
if(input.length<6){input+=n;update();}
if(input.length===6){
if(input===PIN) show('menu');
else{alert("Wrong PIN");clearPin();}
}}
function del(){input=input.slice(0,-1);update();}
function clearPin(){input="";update();}
function update(){display.innerText=input.padEnd(6,"_");}

/* NAV */
function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

if(id==='music'){musicPlayer.play();}
if(id==='message'){resetMessage();}
}

/* BACK */
function goBack(){
musicPlayer.pause();musicPlayer.currentTime=0;
vid.pause();vid.currentTime=0;
show('menu');
}

/* ===== ALBUM ===== */
let images=[];
for(let i=1;i<=20;i++){images.push(`photo${i}.jpg`);}
let index=0;

function openAlbum(){
document.getElementById("albumViewer").style.display="flex";
showImage();
}

function showImage(){
albumImg.src=images[index];
let d="";
for(let i=0;i<images.length;i++){
d+=`<span class="dot ${i===index?'active':''}"></span>`;
}
dots.innerHTML=d;
}

let startX=0;
albumViewer.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
albumViewer.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(startX-endX>50 && index<images.length-1){index++;showImage();}
if(endX-startX>50 && index>0){index--;showImage();}
});

function closeAlbum(){
document.getElementById("albumViewer").style.display="none";
}

/* ===== MESSAGE ===== */
let typing=true;

function openLetter(){
document.getElementById("envelope").style.display="none";

typeWriter(aboutText,"aboutText",12,()=>{
typeWriter(msgText,"msgText",12);
});

document.getElementById("message").onclick=instantShow;
}

function instantShow(){
if(!typing)return;
aboutTextEl.innerHTML=aboutText;
msgTextEl.innerHTML=msgText;
typing=false;
}

function resetMessage(){
document.getElementById("envelope").style.display="block";
aboutTextEl.innerHTML="";
msgTextEl.innerHTML="";
typing=true;
}

/* TYPEWRITER */
function typeWriter(text,id,speed,cb){
let i=0;
let el=document.getElementById(id);
typing=true;

function t(){
if(i<text.length){
el.innerHTML+=text.charAt(i++);
setTimeout(t,speed);
}else{
typing=false;
if(cb)cb();
}}
t();
}

/* TEXT */
const aboutText=`Your go to-milk tea flavors:
Dark nutella chsck
Blueberry chsck
Red Velvet
Strawberry choco
Dark choco
Strawberry oreo chsck

You love Jollibee a lot, you loved the pineapple juice there and you only like the yum burger without the patties (sakin mo pinapakain, maybe because ayaw mo nga sa beef)

You like ham and cheese flav in pizza's
and cheese in fries.

Sa ice creams you like strawberry, chocolate, cookies and cream flavors.

You don't like the Beans in the Halo-halo.

You only eat repolyo, sitaw, potato and eggplant in vegetables.`;

const msgText=`Hi baby imissyouuuuu, I just want to thank you for all of your sacrifices for us. Thank you for treating me right, making me laugh, giving me hugs and kisses. I notice lately malambing ka sakin and I loved that side of you. Thank you so much baby. I also want to remind you that I love you so much baby. Mahal na mahal ka ng adi, no words can explain how much I love you. Sorry din baby kase nung nakaraan I make you mad kase I didn't fix my bags, and nagkukulang ang adi sa oras last time, I'm sorry baby ko. Always remember na mahal na mahal ka ng adi. iloveyouuuuu so much my love ❤️ `;

/* FIX ELEMENTS */
const aboutTextEl=document.getElementById("aboutText");
const msgTextEl=document.getElementById("msgText");
</script>

</body>
</html>
