<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #1e1e2f;
  color: white;
  text-align: center;
}

/* screens */
.screen { display: none; padding: 20px; }
.active { display: block; }

/* buttons */
button {
  padding: 12px 15px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  background: #ff6b81;
  color: white;
  font-size: 16px;
}

/* menu grid */
.menu {
  display: grid;
  grid-template-columns: repeat(2, 150px);
  gap: 20px;
  justify-content: center;
  margin-top: 40px;
}

.card {
  background: #2c2c54;
  padding: 20px;
  border-radius: 15px;
  cursor: pointer;
}

/* images */
img {
  width: 100px;
  margin: 5px;
  border-radius: 10px;
}

/* album grid */
.album {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}
</style>
</head>

<body>

<!-- PIN -->
<div id="pin" class="screen active">
  <h2>🔐 Enter PIN</h2>
  <p>*Clue: the day you said yes*</p>
  <h3 id="display">______</h3>

  <div>
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button><br>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button><br>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button><br>
    <button onclick="del()">←</button>
    <button onclick="press(0)">0</button>
    <button onclick="clearPin()">C</button>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <h1>For You ❤️</h1>

  <div class="menu">
    <div class="card" onclick="show('album')">📸<br>Album</div>
    <div class="card" onclick="show('music')">🎵<br>Music</div>
    <div class="card" onclick="show('video')">🎥<br>Video</div>
    <div class="card" onclick="show('message')">💌<br>Message</div>
  </div>
</div>

<!-- ALBUM -->
<div id="album" class="screen">
  <h2>📸 Album</h2>

  <div class="album">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
    <img src="photo5.jpg">
    <img src="photo6.jpg">
    <img src="photo7.jpg">
    <img src="photo8.jpg">
    <img src="photo9.jpg">
    <img src="photo10.jpg">
    <img src="photo11.jpg">
    <img src="photo12.jpg">
    <img src="photo13.jpg">
    <img src="photo14.jpg">
    <img src="photo15.jpg">
    <img src="photo16.jpg">
    <img src="photo17.jpg">
    <img src="photo18.jpg">
    <img src="photo19.jpg">
    <img src="photo20.jpg">
  </div>

  <button onclick="goBack()">Back</button>
</div>

<!-- MUSIC -->
<div id="music" class="screen">
  <h2>🎵 Music</h2>

  <audio id="player" loop>
    <source src="music.mp3">
  </audio>

  <button onclick="goBack()">Back</button>
</div>

<!-- VIDEO -->
<div id="video" class="screen">
  <h2>🎥 Video</h2>

  <video id="vid" width="300" controls>
    <source src="video.mp4">
  </video>

  <br>
  <button onclick="goBack()">Back</button>
</div>

<!-- MESSAGE -->
<div id="message" class="screen">
  <h2>💌 Message</h2>
  <p>
    I'm really sorry mahal 😔<br>
    Babawi ako sayo 🥺<br>
    I love you so much ❤️
  </p>

  <button onclick="goBack()">Back</button>
</div>

<script>
const PIN = "021423";
let input = "";

/* PIN */
function press(n){
  if(input.length < 6){
    input += n;
    update();
  }

  if(input.length === 6){
    if(input === PIN){
      show('menu');
    } else {
      alert("Wrong PIN!");
      clearPin();
    }
  }
}

function del(){
  input = input.slice(0,-1);
  update();
}

function clearPin(){
  input = "";
  update();
}

function update(){
  document.getElementById("display").innerText =
    input.padEnd(6, "_");
}

/* NAVIGATION */
function show(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  // auto play music
  if(id === 'music'){
    document.getElementById('player').play();
  }
}

/* BACK */
function goBack(){
  // stop music
  const music = document.getElementById('player');
  music.pause();
  music.currentTime = 0;

  // stop video
  const vid = document.getElementById('vid');
  vid.pause();
  vid.currentTime = 0;

  show('menu');
}
</script>

</body>
</html>
